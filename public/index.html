<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garbage Visualization - Nhóm 9</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>Garbage Visualization</h1>
          <p>Nhóm 9</p>
        </div>
      </header>
      <div class="app-main">
        <aside class="sidebar">
          <section class="panel">
            <h2>Lớp dữ liệu</h2>
            <label class="check-row">
              <input type="checkbox" data-layer="bounds" checked />
              <span>Ranh giới</span>
            </label>
            <label class="check-row">
              <input type="checkbox" data-layer="building" checked />
              <span>Tòa nhà</span>
            </label>
            <label class="check-row">
              <input type="checkbox" data-layer="road" checked />
              <span>Đường</span>
            </label>
            <label class="check-row">
              <input type="checkbox" data-layer="instruction-generated" checked />
              <span>Đường hướng dẫn</span>
            </label>
            <label class="check-row">
              <input type="checkbox" data-layer="garbadge" checked />
              <span>Điểm rác</span>
            </label>
          </section>
          <section class="panel">
            <h2>Chú giải</h2>
            <ul class="legend-list">
              <li><span class="legend-dot bounds"></span><span>Ranh giới</span></li>
              <li><span class="legend-dot building"></span><span>Tòa nhà</span></li>
              <li><span class="legend-dot road"></span><span>Đường</span></li>
              <li><span class="legend-dot instruction"></span><span>Đường hướng dẫn</span></li>
              <li><span class="legend-dot garbadge"></span><span>Điểm rác</span></li>
            </ul>
          </section>
          <section class="panel info-panel">
            <h2>Thông tin đối tượng</h2>
            <div id="feature-info" class="info-box">
              <p class="info-empty">Bấm vào đối tượng để xem thuộc tính.</p>
            </div>
          </section>
          <section class="panel db-panel">
            <h2>Thông tin CSDL</h2>
            <div id="db-meta" class="meta-box">
              <p class="info-empty">Đang tải thông tin DB...</p>
            </div>
          </section>
        </aside>
        <main class="map-area">
          <div id="map"></div>
        </main>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/layers.js"></script>
    <script src="./js/map.js"></script>
  </body>
</html>
